services:
  nms-bff:
    build:
      context: ../apps/bff
      dockerfile: Dockerfile
    container_name: nms-bff
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "${PORT:-8080}"
      THINGSBOARD_BASE_URL: "${THINGSBOARD_BASE_URL:-}"
      THINGSBOARD_API_KEY: "${THINGSBOARD_API_KEY:-}"
      THINGSBOARD_SITE_ASSET_TYPE: "${THINGSBOARD_SITE_ASSET_TYPE:-site}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-30}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  nms-web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: nms-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      nms-bff:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
