services:
  postgres:
    restart: always
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - nms-net

  tb-core:
    restart: always
    image: thingsboard/tb-node:4.3.0.1
    expose:
      - "8080"
    ports:
      - "1883:1883"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    environment:
      TB_SERVICE_ID: tb-core
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - nms-net

  nms-bff:
    restart: unless-stopped
    build:
      context: ../apps/bff
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      PORT: "8080"
      THINGSBOARD_BASE_URL: "http://tb-core:8080"
      THINGSBOARD_API_KEY: "${THINGSBOARD_API_KEY}"
      THINGSBOARD_SITE_ASSET_TYPE: "${THINGSBOARD_SITE_ASSET_TYPE:-site}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-30}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://dash.prabutama.my.id}"
    depends_on:
      - tb-core
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nms-net

  nms-web:
    restart: unless-stopped
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-/api}"
    depends_on:
      nms-bff:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - nms-net

  nginx:
    restart: always
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - tb-core
      - nms-bff
      - nms-web
    networks:
      - nms-net

networks:
  nms-net:
    driver: bridge
